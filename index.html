const CATS = {
  Substantiv:{color:"#4A7FC1"},Verb:{color:"#2E8B74"},Adjektiv:{color:"#8B6DB5"},
  Adverb:{color:"#B56D8B"},Konjunktion:{color:"#B58A2E"},Ausdruck:{color:"#6D8BB5"}
};

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function loadVocab(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);if(p.length>0)return p;}}catch{}
  localStorage.setItem(STORAGE_KEY,JSON.stringify(VOCAB_DATA));
  return VOCAB_DATA;
}
function saveVocabLS(v){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(v));}catch{}}

function Badge({cat}){
  const c=CATS[cat]||CATS.Ausdruck;
  return <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:c.color+"18",color:c.color,border:`0.5px solid ${c.color}40`,fontWeight:600,whiteSpace:"nowrap"}}>{cat}</span>;
}

function WordCard({word,onDelete}){
  const [open,setOpen]=useState(false);
  const lbl = word.type==="Substantiv"?`${word.artikel} ${word.deutsch}`:word.deutsch;
  return(
    <div onClick={()=>setOpen(o=>!o)} style={{borderRadius:10,border:"1px solid var(--border)",background:"var(--bg-primary)",padding:"12px 16px",cursor:"pointer",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Badge cat={word.type}/><span style={{fontWeight:600,fontSize:15}}>{lbl}</span></div>
        <span style={{fontSize:11,color:"var(--text-tertiary)"}}>{open?"▲":"▼"}</span>
      </div>
      <div style={{fontSize:12,color:"var(--text-secondary)",marginTop:3}}>{word.español}</div>
      {open&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:13}}>
        {word.type==="Substantiv"&&<div style={{color:"var(--text-secondary)"}}>Plural: <b>{word.plural||"—"}</b></div>}
        {word.type==="Verb"&&<div style={{display:"flex",flexDirection:"column",gap:2}}>
          {[["Infinitiv",word.deutsch],["Präsens",word.prasens],["Präteritum",word.prateritum],["Perfekt",word.perfekt]].map(([l,v])=>v&&<div key={l} style={{color:"var(--text-secondary)"}}>{l}: <b>{v}</b></div>)}
        </div>}
        {word.type==="Konjunktion"&&word.funktion&&<div style={{color:"var(--text-secondary)"}}>Funktion: <b>{word.funktion}</b></div>}
        {word.type==="Ausdruck"&&word.kontext&&<div style={{color:"var(--text-secondary)"}}>Kontext: <b>{word.kontext}</b></div>}
        <button onClick={e=>{e.stopPropagation();onDelete(word.id);}} style={{marginTop:8,fontSize:11,color:"var(--text-tertiary)",background:"none",border:"none",cursor:"pointer",padding:0}}>löschen</button>
      </div>}
    </div>
  );
}

function FlashcardMode({vocab}){
  const [dir,setDir]=useState(null);
  const [cards,setCards]=useState([]);
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);

  useEffect(()=>{if(dir){setCards(shuffle(vocab));setIdx(0);setFlipped(false);}},[dir]);

  if(!dir) return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:4}}>Richtung wählen — elige dirección:</div>
      {[["de->es","🇩🇪 → 🇪🇸"],["es->de","🇪🇸 → 🇩🇪"],["mixed","Gemischt"]].map(([v,l])=>(
        <button key={v} onClick={()=>setDir(v)} style={{padding:"16px",borderRadius:12,border:"1px solid var(--border)",background:"var(--bg-secondary)",cursor:"pointer",fontSize:15,fontWeight:600,textAlign:"center"}}>{l}</button>
      ))}
    </div>
  );

  if(!cards.length) return null;
  const card = cards[idx%cards.length];
  const actualDir = dir==="mixed"?(idx%2===0?"de->es":"es->de"):dir;
  const deLabel = card.type==="Substantiv"?`${card.artikel} ${card.deutsch}`:card.deutsch;
  const front = actualDir==="de->es"?deLabel:card.español;
  const back  = actualDir==="de->es"?card.español:deLabel;

  const goNext=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>i+1),120);};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16,alignItems:"center"}}>
      <div style={{fontSize:12,color:"var(--text-tertiary)"}}>{(idx%cards.length)+1} / {cards.length}</div>
      <div onClick={()=>setFlipped(f=>!f)} style={{width:"100%",minHeight:180,borderRadius:16,border:"1px solid var(--border-md)",background:flipped?"var(--bg-secondary)":"var(--bg-primary)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:"28px 20px",textAlign:"center",gap:10,transition:"background 0.15s"}}>
        <Badge cat={card.type}/>
        <div style={{fontSize:26,fontWeight:700,marginTop:4,lineHeight:1.3}}>{flipped?back:front}</div>
        {!flipped&&<div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:6}}>Tippen zum Umdrehen ↻</div>}
        {flipped&&card.type==="Verb"&&<div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:4}}>{[card.prasens,card.prateritum,card.perfekt].filter(Boolean).join(" · ")}</div>}
      </div>
      {flipped&&<div style={{display:"flex",gap:10,width:"100%"}}>
        <button onClick={goNext} style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid #2E8B7440",background:"#2E8B7415",color:"#2E8B74",cursor:"pointer",fontSize:15,fontWeight:700}}>✓ Gewusst</button>
        <button onClick={goNext} style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid #B55A2E40",background:"#B55A2E15",color:"#B55A2E",cursor:"pointer",fontSize:15,fontWeight:700}}>✗ Nochmal</button>
      </div>}
      <button onClick={()=>setDir(null)} style={{fontSize:12,color:"var(--text-tertiary)",background:"none",border:"none",cursor:"pointer"}}>← Richtung ändern</button>
    </div>
  );
}

function QuizMode({vocab}){
  const [q,setQ]=useState(null);
  const [selected,setSelected]=useState(null);
  const [score,setScore]=useState({ok:0,total:0});
  const timer=useRef(null);

  const generate=useCallback(()=>{
    setSelected(null);
    if(timer.current) clearTimeout(timer.current);
    const verbs=vocab.filter(w=>w.type==="Verb"&&w.prateritum&&w.perfekt);
    const all=vocab;
    const rand=Math.random();
    let question;

    if(verbs.length>=3&&rand<0.4){
      const verb=verbs[Math.floor(Math.random()*verbs.length)];
      const missing=Math.random()<0.5?"prateritum":"perfekt";
      const label=missing==="prateritum"?"Präteritum":"Perfekt";
      const correctVal=verb[missing];
      const others=shuffle(verbs.filter(v=>v.id!==verb.id)).slice(0,3).map(v=>v[missing]).filter(Boolean);
      while(others.length<3) others.push(["machte","hatte","ging","kam","war","konnte"][others.length]);
      const options=shuffle([correctVal,...others.slice(0,3)]);
      const frage=missing==="prateritum"
        ?`${verb.deutsch} → ${verb.prasens} → ___ → ${verb.perfekt}`
        :`${verb.deutsch} → ${verb.prasens} → ${verb.prateritum} → ___`;
      question={typ:"Verbform",frage,hint:`¿Cuál es el ${label}?`,correct:correctVal,options,word:verb};
    } else if(rand<0.7){
      const w=all[Math.floor(Math.random()*all.length)];
      const deLabel=w.type==="Substantiv"?`${w.artikel} ${w.deutsch}`:w.deutsch;
      const others=shuffle(all.filter(v=>v.id!==w.id)).slice(0,3).map(v=>v.español);
      const options=shuffle([w.español,...others]);
      question={typ:"DE → ES",frage:deLabel,hint:"Was bedeutet das?",correct:w.español,options,word:w};
    } else {
      const w=all[Math.floor(Math.random()*all.length)];
      const deLabel=w.type==="Substantiv"?`${w.artikel} ${w.deutsch}`:w.deutsch;
      const others=shuffle(all.filter(v=>v.id!==w.id)).slice(0,3).map(v=>v.type==="Substantiv"?`${v.artikel} ${v.deutsch}`:v.deutsch);
      const options=shuffle([deLabel,...others]);
      question={typ:"ES → DE",frage:w.español,hint:"Wie heißt das auf Deutsch?",correct:deLabel,options,word:w};
    }
    setQ(question);
  },[vocab]);

  useEffect(()=>{generate();},[generate]);

  const pick=(opt)=>{
    if(selected) return;
    setSelected(opt);
    setScore(s=>({ok:s.ok+(opt===q.correct?1:0),total:s.total+1}));
    timer.current=setTimeout(()=>generate(),1300);
  };

  if(!q) return null;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:"var(--text-tertiary)",textTransform:"uppercase",letterSpacing:1}}>{q.typ}</span>
        <span style={{fontSize:12,color:"var(--text-secondary)",fontWeight:600}}>{score.ok}/{score.total}</span>
      </div>
      <div style={{borderRadius:14,border:"1px solid var(--border-md)",background:"var(--bg-secondary)",padding:"22px 18px",textAlign:"center"}}>
        <Badge cat={q.word.type}/>
        <div style={{fontSize:26,fontWeight:700,margin:"12px 0 6px",lineHeight:1.3}}>{q.frage}</div>
        <div style={{fontSize:12,color:"var(--text-tertiary)"}}>{q.hint}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {q.options.map((opt,i)=>{
          let bg="var(--bg-primary)",border="1px solid var(--border)",color="var(--text-primary)";
          if(selected){
            if(opt===q.correct){bg="#2E8B7415";border="2px solid #2E8B74";color="#2E8B74";}
            else if(opt===selected){bg="#B55A2E15";border="2px solid #B55A2E";color="#B55A2E";}
            else{color="var(--text-tertiary)";}
          }
          return(
            <button key={i} onClick={()=>pick(opt)} disabled={!!selected} style={{padding:"16px 10px",borderRadius:12,border,background:bg,color,cursor:selected?"default":"pointer",fontSize:13,fontWeight:600,textAlign:"center",lineHeight:1.4,transition:"all 0.12s"}}>
              {opt}
            </button>
          );
        })}
      </div>
      <button onClick={generate} style={{alignSelf:"flex-end",fontSize:12,color:"var(--text-tertiary)",background:"none",border:"none",cursor:"pointer"}}>Überspringen →</button>
    </div>
  );
}

function App(){
  const [view,setView]=useState("list");
  const [vocab,setVocab]=useState([]);
  const [filter,setFilter]=useState("Alle");
  const [practiceMode,setPracticeMode]=useState(null);

  useEffect(()=>{ setVocab(loadVocab()); },[]);

  const deleteWord=(id)=>{ const v=vocab.filter(w=>w.id!==id); setVocab(v); saveVocabLS(v); };

  const filtered=filter==="Alle"?vocab:vocab.filter(w=>w.type===filter);
  const cats=["Alle",...Object.keys(CATS)];

  const NavBtn=({v,l})=>(
    <button onClick={()=>{setView(v);if(v!=="practice")setPracticeMode(null);}} style={{fontSize:14,padding:"8px 18px",borderRadius:20,background:view===v?"var(--text-primary)":"var(--bg-secondary)",color:view===v?"var(--bg-primary)":"var(--text-secondary)",border:"1px solid var(--border)",cursor:"pointer",fontWeight:view===v?700:400}}>{l}</button>
  );

  return(
    <div style={{maxWidth:540,margin:"0 auto",padding:"20px 16px 60px"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:"var(--text-tertiary)",letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>Vokabeltrainer</div>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <span style={{fontSize:24,fontWeight:700}}>Mein Wortschatz</span>
          <span style={{fontSize:13,color:"var(--text-tertiary)"}}>{vocab.length} Wörter</span>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <NavBtn v="list" l="Wörter"/><NavBtn v="practice" l="Üben"/>
      </div>

      {view==="list"&&<div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {cats.map(c=>{
            const cc=CATS[c];
            return<button key={c} onClick={()=>setFilter(c)} style={{fontSize:11,padding:"4px 11px",borderRadius:20,background:filter===c?(cc?cc.color+"20":"var(--text-primary)"):"transparent",color:filter===c?(cc?cc.color:"var(--bg-primary)"):"var(--text-tertiary)",border:`1px solid ${filter===c?(cc?cc.color:"var(--text-primary)"):"var(--border)"}`,cursor:"pointer",fontWeight:filter===c?700:400}}>
              {c} ({c==="Alle"?vocab.length:vocab.filter(w=>w.type===c).length})
            </button>;
          })}
        </div>
        {filtered.length===0
          ?<div style={{color:"var(--text-tertiary)",fontSize:14,padding:"2rem 0"}}>Keine Wörter.</div>
          :filtered.map(w=><WordCard key={w.id} word={w} onDelete={deleteWord}/>)
        }
      </div>}

      {view==="practice"&&<div>
        {vocab.length<4
          ?<div style={{color:"var(--text-tertiary)",fontSize:14}}>Mindestens 4 Wörter nötig.</div>
          :!practiceMode
            ?<div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:4}}>Wähle deinen Übungsmodus:</div>
              <button onClick={()=>setPracticeMode("flashcard")} style={{padding:"20px",borderRadius:14,border:"1px solid var(--border)",background:"var(--bg-primary)",cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>🃏 Flashcards</div>
                <div style={{fontSize:13,color:"var(--text-secondary)"}}>Wort sehen → umdrehen → Deutsch ↔ Español</div>
              </button>
              <button onClick={()=>setPracticeMode("quiz")} style={{padding:"20px",borderRadius:14,border:"1px solid var(--border)",background:"var(--bg-primary)",cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>⚡ Schnellquiz</div>
                <div style={{fontSize:13,color:"var(--text-secondary)"}}>4 Antworten — Übersetzungen & Verbformen</div>
              </button>
            </div>
            :<div>
              <button onClick={()=>setPracticeMode(null)} style={{fontSize:12,color:"var(--text-tertiary)",background:"none",border:"none",cursor:"pointer",marginBottom:16,padding:0}}>← Modus wechseln</button>
              {practiceMode==="flashcard"&&<FlashcardMode vocab={vocab}/>}
              {practiceMode==="quiz"&&<QuizMode vocab={vocab}/>}
            </div>
        }
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
